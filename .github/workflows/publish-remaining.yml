name: Publish Remaining

on:
  workflow_dispatch:
    inputs:
      checkout_ref:
        description: Git ref to publish from
        required: true
        default: v0.9.0
      version:
        description: Release version
        required: true
        default: 0.9.0

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: crates-io
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.checkout_ref }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Publish remaining crates to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          cargo publish --locked -p paft-prediction
          cargo publish --locked -p paft-aggregates
          cargo publish --locked -p paft-fundamentals
          cargo publish --locked -p paft-market
          cargo publish --locked -p paft

  create-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.checkout_ref }}

      - name: Create release notes
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md

          test -s release-notes.md

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.checkout_ref }}
        run: |
          set -euo pipefail

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG" --notes-file release-notes.md
          else
            gh release create "$TAG" --title "$TAG" --notes-file release-notes.md
          fi
