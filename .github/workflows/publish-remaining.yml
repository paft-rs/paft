name: Publish Remaining

on:
  workflow_dispatch:
    inputs:
      checkout_ref:
        description: Git ref to publish from
        required: true
        default: v0.9.0
      version:
        description: Crate version to publish
        required: true
        default: 0.9.0

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: crates-io
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.checkout_ref }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Publish missing crates to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          has_version() {
            curl -fsS "https://crates.io/api/v1/crates/$1/$VERSION" >/dev/null
          }

          wait_for_version() {
            local crate="$1"

            for _ in {1..60}; do
              if has_version "$crate"; then
                echo "$crate $VERSION is visible on crates.io"
                return 0
              fi

              sleep 10
            done

            echo "::error::$crate $VERSION did not become visible on crates.io"
            return 1
          }

          publish_if_missing() {
            local crate="$1"

            if has_version "$crate"; then
              echo "$crate $VERSION already exists on crates.io; skipping"
              return 0
            fi

            cargo publish --locked -p "$crate"
            wait_for_version "$crate"
          }

          crates=(
            paft-domain
            paft-prediction
            paft-aggregates
            paft-fundamentals
            paft-market
            paft
          )

          for crate in "${crates[@]}"; do
            publish_if_missing "$crate"
          done

  create-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.checkout_ref }}

      - name: Create release notes
        env:
          VERSION: ${{ inputs.version }}
        run: |
          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md

          test -s release-notes.md

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.checkout_ref }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG" --notes-file release-notes.md
          else
            gh release create "$TAG" --title "$TAG" --notes-file release-notes.md
          fi
